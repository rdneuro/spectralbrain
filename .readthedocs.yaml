# .readthedocs.yaml — Read the Docs build configuration for SpectralBrain.
# Place this file at the REPOSITORY ROOT (not inside docs/).
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  # System libraries VTK/PyVista need for off-screen rendering of the gallery.
  apt_packages:
    - libgl1
    - libxrender1
    - libxcursor1
    - libxft2
    - libxinerama1
    - xvfb
  jobs:
    post_checkout:
      # Bring the tutorial notebooks into the docs source tree so they render.
      - mkdir -p docs/source/tutorials
      - cp tutorials/*.ipynb docs/source/tutorials/ || true

sphinx:
  configuration: docs/source/conf.py
  fail_on_warning: false

python:
  install:
    - requirements: docs/requirements.txt
    # Install the library itself (core deps) so autosummary can import it.
    # Heavy optional deps are mocked in conf.py via autodoc_mock_imports.
    - method: pip
      path: .

formats:
  - pdf
