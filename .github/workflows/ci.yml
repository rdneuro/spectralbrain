# .github/workflows/ci.yml
# ──────────────────────────────────────────────────────────────────────
# Continuous Integration — runs on every push and pull request.
#
# Jobs:
#   lint        → ruff check + ruff format --check
#   test        → pytest across Python 3.11 / 3.12 × ubuntu / macos
#   build-check → build sdist+wheel, install the wheel in a clean env, import
#   viz-bayesian→ vedo + PyMC tests, headless under xvfb
#
# Uses uv for all dependency resolution (10-50× faster than pip).
# ──────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs for the same PR/branch to save resources.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint ────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: ">=0.11"

      - name: Install Python 3.11
        run: uv python install 3.11

      - name: Install lint dependencies
        run: uv sync --group lint --no-install-workspace

      - name: Ruff check
        run: uv run --no-sync ruff check src/

      - name: Ruff format check
        run: uv run --no-sync ruff format --check src/

  # ── Test matrix ─────────────────────────────────────────────────────
  test:
    name: Test (py${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs needs full git history for versioning

      - uses: astral-sh/setup-uv@v5
        with:
          version: ">=0.11"

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      # Install in locked mode if uv.lock exists, otherwise resolve fresh.
      # Optional extras (viz / bayesian / neuro) are skipped here; tests that
      # need them call pytest.importorskip and are skipped cleanly.
      - name: Install package + test dependencies
        run: |
          if [ -f uv.lock ]; then
            uv sync --locked --group test
          else
            uv sync --group test
          fi

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

      # Upload coverage only from the primary matrix cell.
      - name: Run tests with coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: uv run pytest tests/ --cov=spectralbrain --cov-report=xml -q

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── Build check (ensures the package builds and imports cleanly) ─────
  build-check:
    name: Build check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        with:
          version: ">=0.11"

      - name: Build sdist + wheel
        run: uv build

      - name: Inspect built artifacts
        run: |
          ls -lh dist/
          echo "--- sdist contents ---"
          tar tzf dist/*.tar.gz | head -30
          echo "--- wheel contents ---"
          python3 -m zipfile -l dist/*.whl | head -30

      # Verify the wheel installs and the package imports, in a clean venv.
      # NOTE: `uv venv` creates a pip-less environment, so we install with
      # `uv pip install --python <env>` rather than the venv's own pip.
      - name: Install from wheel and smoke test
        run: |
          uv venv --python 3.11 /tmp/test-env
          uv pip install --python /tmp/test-env/bin/python dist/*.whl
          /tmp/test-env/bin/python -c "
          import spectralbrain as sb
          print(f'SpectralBrain {sb.__version__} imported OK')
          print('Subpackages: core, io, spectral, statistics, backends, utils, viz')
          "

  # ── Visualization + Bayesian tests (need vedo / PyMC; run headless) ──
  viz-bayesian:
    name: Viz + Bayesian (headless)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        with:
          version: ">=0.11"

      - name: Install Python 3.11
        run: uv python install 3.11

      # The targeted tests only need vedo (viz) and PyMC (bayesian); matplotlib
      # and scikit-learn are already core deps. We install the reliable
      # `bayesian` extra plus vedo directly, and deliberately avoid the full
      # `viz` extra, whose niche packages (hippomaps, brainspace, yabplot, ...)
      # are not needed here and do not resolve cleanly on CI runners.
      - name: Install package + bayesian extra and vedo
        run: |
          uv sync --group test --extra bayesian
          uv pip install vedo

      # Offscreen VTK + a virtual framebuffer so vedo can render with no display.
      - name: Run viz + Bayesian tests under xvfb
        env:
          VTK_USE_OFFSCREEN: "1"
          PYVISTA_OFF_SCREEN: "true"
        run: |
          sudo apt-get update && sudo apt-get install -y xvfb libgl1 libxrender1
          xvfb-run -a uv run pytest tests/test_viz_hipp3d.py tests/test_statistics.py \
            -v --tb=short
