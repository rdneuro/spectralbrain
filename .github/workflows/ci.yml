# .github/workflows/ci.yml
# ──────────────────────────────────────────────────────────────────────
# Continuous Integration — runs on every push and pull request.
#
# Jobs:
#   lint     → ruff check + ruff format --check
#   test     → pytest across Python 3.11 / 3.12 × ubuntu / macos
#   coverage → upload to Codecov (ubuntu + py3.11 only)
#
# Uses uv for all dependency resolution (10-50× faster than pip).
# ──────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs for the same PR/branch to save resources.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ── Lint ──────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: ">=0.11"

      - name: Install Python 3.11
        run: uv python install 3.11

      - name: Install dev dependencies
        run: uv sync --group lint --no-install-workspace

      - name: Ruff check
        run: uv run ruff check src/spectralbrain

      - name: Ruff format check
        run: uv run ruff format --check src/spectralbrain

  # ── Test matrix ───────────────────────────────────────────────────
  test:
    name: Test (py${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs needs full git history for versioning

      - uses: astral-sh/setup-uv@v5
        with:
          version: ">=0.11"

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      # Install in locked mode if uv.lock exists, otherwise resolve fresh.
      # --extra viz is skipped on CI because yabplot/vedo need a display.
      - name: Install package + test dependencies
        run: |
          if [ -f uv.lock ]; then
            uv sync --locked --group test
          else
            uv sync --group test
          fi

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short -x

      # Upload coverage only from the primary matrix cell.
      - name: Run tests with coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: uv run pytest tests/ --cov=spectralbrain --cov-report=xml -q

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── Build check (ensures the package builds cleanly) ──────────────
  build-check:
    name: Build check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        with:
          version: ">=0.11"

      - name: Build sdist + wheel
        run: uv build

      - name: Inspect built artifacts
        run: |
          ls -lh dist/
          echo "--- sdist contents ---"
          tar tzf dist/*.tar.gz | head -30
          echo "--- wheel contents ---"
          python3 -m zipfile -l dist/*.whl | head -30

      # Verify the wheel installs and the package actually imports.
      - name: Install from wheel and smoke test
        run: |
          uv venv --python 3.11 /tmp/test-env
          /tmp/test-env/bin/pip install dist/*.whl
          /tmp/test-env/bin/python -c "
          import spectralbrain as sb
          print(f'SpectralBrain {sb.__version__} imported OK')
          print(f'Subpackages: core, io, spectral, statistics, backends, utils, viz')
          "
