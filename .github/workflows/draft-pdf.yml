# Compiles paper/paper.md into the JOSS-formatted PDF on every push that
# touches the paper, using the official Open Journals "inara" action. The
# built PDF is uploaded as a workflow artifact for preview before submission.
name: Draft JOSS paper

on:
  push:
    paths:
      - "paper/**"
      - ".github/workflows/draft-pdf.yml"
  workflow_dispatch:

jobs:
  paper:
    runs-on: ubuntu-latest
    name: Compile paper.md → PDF
    steps:
      - uses: actions/checkout@v4

      - name: Build draft PDF
        uses: openjournals/openjournals-draft-action@master
        with:
          journal: joss
          paper-path: paper/paper.md

      - name: Upload paper PDF
        uses: actions/upload-artifact@v4
        with:
          name: paper
          path: paper/paper.pdf
